name: Validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check plugin bundle is in sync with canonical skills
        run: python scripts/sync_plugin_skills.py --check

      - name: Validate repository
        run: python scripts/validate_repo.py

      - name: Validate skill eval framework
        run: python scripts/check_evals.py

      - name: Check skill-improvement reports are up to date
        run: python scripts/generate_skill_improvement_prompts.py --check

      - name: Check generated cold-start interviews are in sync
        run: python scripts/generate_cold_start_interviews.py --check

      - name: Build static site (verification only)
        run: node site/generate.mjs
