name: Validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Check plugin bundle is in sync with canonical skills
        run: python scripts/sync_plugin_skills.py --check

      - name: Validate repository
        run: python scripts/validate_repo.py

      - name: Run tooling unit tests
        run: python -m unittest discover -s tests

      - name: Check skill metadata and router are up to date
        run: python scripts/build_skill_index.py --check

      - name: Check typed skill contract registry is up to date
        run: python scripts/build_skill_specs.py --check

      - name: Check platform pack manifest is up to date
        run: python scripts/build_platform_packs.py --check

      - name: Check context metrics are up to date
        run: python scripts/generate_context_metrics.py --check

      - name: Check skill readiness reports are up to date
        run: python scripts/generate_skill_health_report.py --check

      - name: Validate skill eval framework
        run: python scripts/check_evals.py

      - name: Run skill eval candidates (static, --strict)
        run: python scripts/run_evals.py --strict --quiet

      - name: Check legal prose of repository-owned work-product samples
        run: python scripts/check_legal_prose.py

      - name: Check eval coverage report is up to date
        run: python scripts/generate_eval_report.py --check

      - name: Check skill-improvement reports are up to date
        run: python scripts/generate_skill_improvement_prompts.py --check

      - name: Check generated cold-start interviews are in sync
        run: python scripts/generate_cold_start_interviews.py --check

      - name: Build static site (verification only)
        run: node site/generate.mjs
