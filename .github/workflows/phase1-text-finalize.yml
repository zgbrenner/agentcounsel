name: Phase 1 Text Finalization

on:
  push:
    branches: [feat/phase-1-mcp-router]

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: feat/phase-1-mcp-router

      - name: Apply deterministic text updates
        run: |
          python - <<'PY'
          from pathlib import Path

          shared = Path("scripts/_shared.py")
          text = shared.read_text(encoding="utf-8")
          old = "# The eight skills that must each have a sample eval file under evals/skills/."
          new = "# Skills whose candidate outputs are required by the strict static eval gate."
          if old in text:
              text = text.replace(old, new, 1)
              shared.write_text(text, encoding="utf-8")

          changelog = Path("CHANGELOG.md")
          text = changelog.read_text(encoding="utf-8")
          marker = "### Added\n\n"
          entry = """- **Phase 1 MCP and repository metrics:** `agentcounsel_mcp.py` now uses\n  canonical generated metadata for stable-ID discovery and structured routing;\n  `mcp_server.py` is a thin FastMCP adapter with compact skill-card retrieval.\n  Standard-library tests cover routing, aliases, missing-input gates, context\n  metrics, and readiness signals. New generated reports track per-skill and\n  per-pack context pressure plus repository-readiness evidence without claiming\n  legal correctness. CI and `scripts/check_all.py` enforce report drift checks.\n"""
          if entry not in text:
              text = text.replace(marker, marker + entry, 1)
              changelog.write_text(text, encoding="utf-8")
          PY

      - name: Commit final text updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/_shared.py CHANGELOG.md
          if git diff --cached --quiet; then
            echo "Text updates already current."
          else
            git commit -m "docs: record phase 1 MCP and metrics work [skip ci]"
            git push origin HEAD:feat/phase-1-mcp-router
          fi
