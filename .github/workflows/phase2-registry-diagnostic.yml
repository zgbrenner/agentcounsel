name: Phase 2A Registry Diagnostic

on:
  push:
    branches: [feat/phase-2-skill-spec-v2]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feat/phase-2-skill-spec-v2
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Capture registry tests
        run: |
          set +e
          python -m unittest tests.test_build_skill_specs -v > reports/phase2-registry-test-output.txt 2>&1
          echo "exit_code=$?" >> reports/phase2-registry-test-output.txt
          cat reports/phase2-registry-test-output.txt
          exit 0
      - name: Commit diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/phase2-registry-test-output.txt
          git commit -m "chore: capture Phase 2A registry test output [skip ci]"
          git push origin HEAD:feat/phase-2-skill-spec-v2
