name: Phase 2A Compiler Patch

on:
  push:
    branches: [feat/phase-2-skill-spec-v2]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: feat/phase-2-skill-spec-v2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Add raw-overlay duplicate validation
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/skill_spec_v2.py")
          text = path.read_text(encoding="utf-8")
          helper = '''\n\ndef _raw_overlay_duplicate_errors(custom: dict[str, Any]) -> list[str]:
              """Detect duplicate stable IDs before merge normalization collapses them."""
              groups: list[tuple[str, Any]] = [
                  ("execution mode", custom.get("execution_modes")),
                  ("input", custom.get("input_schema")),
                  ("output", custom.get("output_schema")),
                  ("module", custom.get("modules")),
              ]
              gates = custom.get("gates")
              if isinstance(gates, dict):
                  groups.append(("custom gate", gates.get("custom")))
              evidence = custom.get("evidence_schema")
              if isinstance(evidence, dict):
                  groups.append(("evidence field", evidence.get("fields")))
              errors: list[str] = []
              for label, records in groups:
                  duplicates = _duplicate_ids(records)
                  if duplicates:
                      errors.append(
                          f"duplicate {label} ids in custom spec: " + ", ".join(duplicates)
                      )
              return errors
          '''
          marker = "\ndef compile_skill_spec(\n"
          if "def _raw_overlay_duplicate_errors(" not in text:
              text = text.replace(marker, helper + marker, 1)
          old = '''    custom = load_custom_spec(skill_dir)
              if custom is not None:
                  result = _merge_custom(result, custom, root, skill_dir)
          '''
          new = '''    custom = load_custom_spec(skill_dir)
              if custom is not None:
                  duplicate_errors = _raw_overlay_duplicate_errors(custom)
                  if duplicate_errors:
                      raise SpecValidationError(
                          f"{skill_dir / SPEC_FILENAME}: invalid Skill Specification v2:\\n- "
                          + "\\n- ".join(duplicate_errors)
                      )
                  result = _merge_custom(result, custom, root, skill_dir)
          '''
          if old not in text:
              raise SystemExit("compiler insertion point not found")
          text = text.replace(old, new, 1)
          path.write_text(text, encoding="utf-8")
          PY

      - name: Run focused compiler tests
        run: python -m unittest tests.test_skill_spec_v2 -v

      - name: Remove one-time diagnostic files
        run: |
          rm -f reports/phase2-test-output.txt
          rm -f .github/workflows/phase2-diagnostic.yml

      - name: Commit compiler fix and cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: reject duplicate IDs in custom skill specs [skip ci]"
          git push origin HEAD:feat/phase-2-skill-spec-v2
