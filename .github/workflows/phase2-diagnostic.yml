name: Phase 2A Focused Test Diagnostic

on:
  push:
    branches: [feat/phase-2-skill-spec-v2]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: feat/phase-2-skill-spec-v2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Capture focused test output
        run: |
          set +e
          python -m unittest tests.test_skill_spec_v2 -v > reports/phase2-test-output.txt 2>&1
          echo "exit_code=$?" >> reports/phase2-test-output.txt
          cat reports/phase2-test-output.txt
          exit 0

      - name: Commit diagnostic output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/phase2-test-output.txt
          git commit -m "chore: capture Phase 2A focused test output [skip ci]"
          git push origin HEAD:feat/phase-2-skill-spec-v2
