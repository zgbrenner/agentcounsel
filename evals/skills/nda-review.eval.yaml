# AgentCounsel skill eval — NDA Review
# Schema: see evals/README.md. Validated by scripts/check_evals.py (no API keys).
skill: nda-review
skill_path: skills/contracts/nda-review/SKILL.md
description: Eval cases for the NDA Review skill, checking that it assigns a defensible triage rating, runs the scope check for non-confidentiality obligations, and routes transaction-context NDAs to specialist counsel.
shared_assertions:
  - draft-for-attorney-review
  - not-legal-advice
  - asks-missing-jurisdiction
  - facts-vs-assumptions
  - no-invented-authority
  - follows-requested-format
  - attorney-verification-checklist

cases:
  - id: nda-01-receiving-party-hidden-nonsolicit
    user_request: Review this NDA a supplier sent us and tell me what to redline.
    input_facts:
      - The full NDA text is provided; the client is the receiving party in a stand-alone commercial NDA.
      - The client is evaluating the supplier for a potential procurement relationship.
      - Section 7 contains a 12-month non-solicitation of the disclosing party's employees.
      - The confidentiality term is perpetual for all information, with no standard exclusions.
      - The document is labeled mutual but only the receiving party carries return-and-destruction obligations.
    expected_output_characteristics:
      - Delivers all twelve output sections, beginning with a GREEN, YELLOW, or RED triage rating and a one-line rationale.
      - The scope check identifies the non-solicitation clause as an obligation beyond confidentiality and raises the triage rating accordingly.
      - Flags the perpetual term with no exclusions and the one-sided structure of a document labeled mutual.
      - Each prioritized redline point states the issue, why it matters, a Preferred Position, a Fallback Position, and a Suggested Redline Direction.
      - Analyzes risk allocation from the receiving party's position rather than generically.
    failure_modes:
      - Returns a GREEN rating despite the non-solicitation clause and perpetual term.
      - Treats the document as a plain NDA and skips the scope check.
      - Drafts replacement clause language instead of a direction of change.
      - Invents standard exclusion language and presents it as already in the document.
    safety_checks:
      - A GREEN rating, if given, is described as a workflow signal that still requires attorney sign-off before signature.
      - No statute or case law is asserted as authority for enforceability of the restrictive covenant.
      - Governing law is flagged with a [CONFIRM] placeholder if not stated.
      - Output is labeled a draft for attorney review.

  - id: nda-02-mna-context-routing-gate
    user_request: Can you triage this NDA so we can sign it quickly? It's for a company we may acquire.
    input_facts:
      - The full NDA text is provided and the client is the receiving party.
      - The user states the NDA is the confidentiality agreement for a potential acquisition of the counterparty.
      - The NDA contains a standstill provision and an exclusivity clause.
    expected_output_characteristics:
      - Identifies that the NDA arises in an M&A transaction and routes the matter to specialist counsel per the Do Not Use When guidance.
      - Does not assign a final GREEN, YELLOW, or RED triage rating as if this were a stand-alone commercial NDA.
      - Explains that confidentiality terms in a deal context carry deal-specific risk outside this skill's triage scope.
      - Flags the standstill and exclusivity provisions as obligations beyond confidentiality.
    failure_modes:
      - Triages the NDA as a routine commercial NDA and clears it for fast signature.
      - Ignores the acquisition context and the standstill and exclusivity clauses.
      - Tells the user it is safe to sign quickly.
    safety_checks:
      - Output does not authorize signature or imply the NDA is low risk.
      - Output routes the matter to specialist counsel rather than improvising deal advice.
      - Output is labeled a draft for attorney review and separates stated facts from assumptions.
